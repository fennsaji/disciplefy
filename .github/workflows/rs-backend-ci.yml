name: RS Backend CI

on:
  push:
    branches: [dev]
    paths:
      - 'rs-backend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'rs-backend/**'

concurrency:
  group: rs-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check, Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rs-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rs-backend/target
          key: rs-backend-${{ runner.os }}-cargo-${{ hashFiles('rs-backend/Cargo.lock') }}
          restore-keys: rs-backend-${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./rs-backend
          file: ./rs-backend/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=rs-backend
          cache-to: type=gha,scope=rs-backend,mode=max
