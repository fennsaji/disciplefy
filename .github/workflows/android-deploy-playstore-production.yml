name: Deploy Android to Play Store (Production)

# Production releases triggered by version tags or manual dispatch
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      rollout_percentage:
        description: 'Staged rollout percentage'
        required: true
        default: '10'
        type: choice
        options:
          - '10'
          - '25'
          - '50'
          - '100'

env:
  FLUTTER_VERSION: '3.32.8'
  JAVA_VERSION: '17'

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy to Play Store Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📋 Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' frontend/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          # Offset by 10000 to ensure production build numbers always exceed beta
          BUILD_NUMBER=$(( ${{ github.run_number }} + 10000 ))
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION+$BUILD_NUMBER"

          # If triggered by tag, validate tag matches pubspec
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            TAG_VERSION="${TAG#v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "❌ Tag version ($TAG_VERSION) does not match pubspec.yaml ($VERSION)"
              echo "   Update pubspec.yaml version before tagging."
              exit 1
            fi
            echo "✅ Tag matches pubspec version"
          fi

      - name: 📊 Resolve rollout parameters
        id: rollout
        run: |
          PCT="${{ github.event.inputs.rollout_percentage || '10' }}"
          if [ "$PCT" = "100" ]; then
            echo "status=completed" >> $GITHUB_OUTPUT
            echo "user_fraction=" >> $GITHUB_OUTPUT
            echo "✅ Full rollout (100%)"
          else
            echo "status=inProgress" >> $GITHUB_OUTPUT
            FRACTION=$(echo "scale=2; $PCT / 100" | bc)
            echo "user_fraction=$FRACTION" >> $GITHUB_OUTPUT
            echo "✅ Staged rollout: ${PCT}% (fraction: $FRACTION)"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Flutter analyze
        run: |
          cd frontend
          flutter analyze --fatal-infos

      - name: Run Flutter tests
        run: |
          cd frontend
          flutter test

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > frontend/android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > frontend/android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > frontend/android/app/google-services.json

      - name: Build Android App Bundle (Production)
        run: |
          cd frontend
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }} \
            --dart-define=APP_URL=https://www.disciplefy.in \
            --dart-define=FLUTTER_ENV=production \
            --dart-define=GOOGLE_CLOUD_TTS_API_KEY=${{ secrets.GOOGLE_CLOUD_TTS_API_KEY }} \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Setup Google Play credentials
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > play-store-service-account.json

      - name: Upload to Play Store (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: play-store-service-account.json
          packageName: com.disciplefy.bible_study
          releaseFiles: frontend/build/app/outputs/bundle/release/app-release.aab
          track: production
          status: ${{ steps.rollout.outputs.status }}
          userFraction: ${{ steps.rollout.outputs.user_fraction }}
          whatsNewDirectory: distribution/whatsnew

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f frontend/android/app/upload-keystore.jks
          rm -f frontend/android/key.properties
          rm -f frontend/android/app/google-services.json
          rm -f play-store-service-account.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-production-v${{ steps.version.outputs.version_name }}
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 365

      - name: 🏷️ Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version_name }}
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Production release v${{ steps.version.outputs.version_name }} deployed to Play Store"
          echo "📊 Rollout: ${{ steps.rollout.outputs.status }} (${{ github.event.inputs.rollout_percentage || '10' }}%)"
          echo "🔗 Build: ${{ steps.version.outputs.build_number }}"
