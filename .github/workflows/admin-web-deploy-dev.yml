name: Admin Web Development Deployment

on:
  push:
    branches: [dev]
    paths:
      - 'admin-web/**'
      - '.github/workflows/admin-web-deploy-dev.yml'
  workflow_dispatch:
    inputs:
      deploy_to_vercel:
        description: 'Deploy to Vercel Development'
        required: false
        default: true
        type: boolean

concurrency:
  group: admin-web-dev-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Admin Web Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./admin-web

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npm run type-check

      - name: 🔍 Lint
        run: npm run lint

      - name: ✅ Validation summary
        run: |
          echo "🎉 Admin web validation completed successfully!"
          echo "✅ Dependencies installed"
          echo "✅ Type check passed"
          echo "✅ Lint passed"

  build-and-deploy:
    name: Build and Deploy to Vercel Development
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./admin-web

    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📝 Create development environment file
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=https://${{ secrets.SUPABASE_DEV_PROJECT_REF }}.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_DEV_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RS_BACKEND_URL=${{ secrets.RS_BACKEND_URL }}
          NODE_ENV=development
          EOF
          echo "✅ Development environment file created"

      - name: 🔗 Link Vercel project
        if: ${{ github.event.inputs.deploy_to_vercel != 'false' }}
        run: |
          vercel link \
            --token ${{ secrets.VERCEL_DEV_TOKEN }} \
            --scope ${{ secrets.VERCEL_DEV_ORG_ID }} \
            --project ${{ secrets.VERCEL_ADMIN_DEV_PROJECT_ID }} \
            --yes
          vercel pull \
            --token ${{ secrets.VERCEL_DEV_TOKEN }} \
            --yes \
            --environment=production
          echo "✅ Vercel development project linked and settings pulled"

      - name: 🏗️ Build with Vercel
        if: ${{ github.event.inputs.deploy_to_vercel != 'false' }}
        run: |
          vercel build \
            --token ${{ secrets.VERCEL_DEV_TOKEN }} \
            --prod
          echo "✅ Build completed"

      - name: 🚀 Deploy to Vercel Development
        id: deploy
        if: ${{ github.event.inputs.deploy_to_vercel != 'false' }}
        run: |
          VERCEL_URL=$(vercel deploy \
            --token ${{ secrets.VERCEL_DEV_TOKEN }} \
            --prebuilt \
            --prod)
          echo "deployment-url=$VERCEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to development: $VERCEL_URL"

      - name: 🧹 Security cleanup
        if: always()
        run: |
          rm -f .env.local
          echo "✅ Cleanup completed"

      - name: 📊 Deployment summary
        run: |
          echo "🎉 Admin web development deployment completed!"
          if [ "${{ github.event.inputs.deploy_to_vercel }}" != "false" ]; then
            echo "🌐 Development URL: ${{ steps.deploy.outputs.deployment-url }}"
          else
            echo "⏭️ Vercel deployment skipped"
          fi
          echo "📋 Configuration:"
          echo "   • Environment: development"
          echo "   • Supabase: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}.supabase.co"
          echo "   • Logging: Enabled"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [validate, build-and-deploy]
    if: always()

    steps:
      - name: 📢 Deployment notification
        run: |
          if [ "${{ needs.build-and-deploy.result }}" = "success" ]; then
            echo "🎉 Admin web development deployment was successful!"
            echo "🌐 URL: ${{ needs.build-and-deploy.outputs.deployment-url }}"
          else
            echo "❌ Admin web development deployment failed. Check the logs above."
            exit 1
          fi
