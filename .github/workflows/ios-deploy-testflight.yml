name: Deploy iOS to TestFlight

# Beta releases — mirrors android-deploy-playstore-beta.yml.
# Push to main → builds with Xcode 26 on a macOS runner → uploads to TestFlight.
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/ios-deploy-testflight.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.8'

jobs:
  build-and-deploy:
    name: Build IPA & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📋 Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' frontend/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION+${{ github.run_number }}"

      # Apple requires the iOS 26 SDK (Xcode 26+) for App Store uploads.
      - name: 🛠️ Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🐦 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 💎 Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: frontend/ios

      - name: 📦 Get Flutter dependencies
        run: cd frontend && flutter pub get

      - name: 📝 Create GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > frontend/ios/Runner/GoogleService-Info.plist

      # Compile + inject dart-defines/version into Generated.xcconfig (gym reuses them).
      - name: 🔨 Build iOS (no codesign)
        run: |
          cd frontend
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }} \
            --dart-define=APP_URL=https://www.disciplefy.in \
            --dart-define=FLUTTER_ENV=production \
            --dart-define=GOOGLE_CLOUD_TTS_API_KEY=${{ secrets.GOOGLE_CLOUD_TTS_API_KEY }} \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: 🚀 Fastlane beta (match → archive → TestFlight)
        working-directory: frontend/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
        run: bundle exec fastlane beta

      - name: 🧹 Security cleanup
        if: always()
        run: rm -f frontend/ios/Runner/GoogleService-Info.plist

      - name: 📦 Upload IPA as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disciplefy-ios-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: frontend/build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: ignore
