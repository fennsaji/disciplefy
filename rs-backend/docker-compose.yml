# Production compose — runs on the VPS.
# Caddy runs on the host (not Docker) and proxies to this backend via localhost:8090.
# Vector ships logs to Axiom.
# Database is Supabase-hosted (no local postgres).

services:
  backend:
    image: ghcr.io/fennsaji/disciplefy-rs-backend:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  vector:
    image: timberio/vector:0.43.0-alpine
    restart: unless-stopped
    user: root
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      AXIOM_API_KEY: ${AXIOM_API_KEY}
      AXIOM_DATASET: ${AXIOM_DATASET}
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
